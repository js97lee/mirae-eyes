<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8가지 눈 표정</title>
  <style>
    :root {
      --screen-bg: #0a0a0a;
      --frame: #2a2a2e;
      --led: #3dff6a;
      --eye: #f5f5f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #000;
      color: #e8e8e8;
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 1rem;
    }

    body.overview-mode {
      padding: 0;
      gap: 0;
      justify-content: stretch;
    }

    .screen-wrap {
      position: relative;
      width: min(92vw, 420px);
      aspect-ratio: 4 / 3;
      background: var(--screen-bg);
      border-radius: 22px;
      border: 3px solid var(--frame);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.04),
        0 12px 40px rgba(0,0,0,0.6);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .status-led {
      position: absolute;
      top: 10px;
      left: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--led);
      box-shadow: 0 0 10px var(--led), 0 0 22px rgba(61,255,106,0.35);
      z-index: 2;
      pointer-events: none;
    }

    .eyes-layer {
      width: 100%;
      height: 100%;
      padding: 8% 6% 12%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eyes-layer canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    body.overview-mode .screen-wrap {
      width: 100vw;
      height: 100dvh;
      aspect-ratio: auto;
      border-radius: 0;
      border-width: 0;
      box-shadow: none;
    }

    body.overview-mode .mode-controls {
      position: fixed;
      top: 14px;
      right: 14px;
      width: auto;
      z-index: 10;
      margin: 0;
    }

    body.overview-mode .controls,
    body.overview-mode .hint {
      display: none;
    }

    body.overview-mode .eyes-layer {
      padding: 4% 4% 7%;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 520px;
    }

    .mode-controls {
      width: min(92vw, 420px);
      display: flex;
      justify-content: flex-end;
      margin-bottom: -1rem;
    }

    .controls button,
    .mode-controls button {
      appearance: none;
      border: 1px solid #333;
      background: #111;
      color: #ccc;
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .controls button:hover,
    .mode-controls button:hover {
      background: #1a1a1a;
      border-color: #444;
      color: #fff;
    }

    .controls button:focus-visible,
    .mode-controls button:focus-visible {
      outline: 2px solid var(--led);
      outline-offset: 2px;
    }

    .controls button.active,
    .mode-controls button.active {
      background: #222;
      border-color: #555;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(61,255,106,0.25);
    }

    .hint {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="mode-controls">
    <button type="button" id="overview-toggle" data-action="overview">전체보기</button>
  </div>

  <div class="screen-wrap" aria-live="polite">
    <span class="status-led" aria-hidden="true"></span>
    <div class="eyes-layer">
      <canvas id="eyes-canvas" width="128" height="72" role="img" aria-label="픽셀 눈 표정 디스플레이"></canvas>
    </div>
  </div>

  <nav class="controls" aria-label="눈 모양 선택">
    <button type="button" data-target="joy" class="active">기쁨</button>
    <button type="button" data-target="sad">슬픔</button>
    <button type="button" data-target="angry">분노</button>
    <button type="button" data-target="fear">두려움</button>
    <button type="button" data-target="disgust">혐오</button>
    <button type="button" data-target="surprise">놀람</button>
    <button type="button" data-target="trust">신뢰</button>
    <button type="button" data-target="hope">기대</button>
  </nav>
  <p class="hint">숫자 키 <kbd>1</kbd>–<kbd>8</kbd> 표정 전환, <kbd>0</kbd> 전체보기 크기 전환.</p>

  <script>
    const ids = ["joy", "sad", "angry", "fear", "disgust", "surprise", "trust", "hope"];
    const labels = ["기쁨", "슬픔", "분노", "두려움", "혐오", "놀람", "신뢰", "기대"];
    const overviewToggle = document.getElementById("overview-toggle");
    const canvas = document.getElementById("eyes-canvas");
    const ctx = canvas.getContext("2d");
    let currentIndex = 0;

    const patterns = {
      joy: ["100000001", "010000010", "001000100", "000101000"],
      sad: ["000101000", "001000100", "010000010", "100000001"],
      angryL: ["111111000", "011111100", "001111110"],
      angryR: ["000111111", "001111110", "011111100"],
      fearL: ["000111111", "001111110", "011111100"],
      fearR: ["111111000", "011111100", "001111110"],
      disgust: ["111111111", "111111111"],
      surprise: ["001111100", "011111110", "111001111", "111001111", "011111110", "001111100"],
      trust: ["111111111", "111111111", "111111111"],
      hope: ["000101000", "001000100", "010000010", "100000001", "010000010", "001000100"]
    };

    function drawPattern(pattern, startX, startY, size, color, flipX = false) {
      for (let y = 0; y < pattern.length; y++) {
        const row = pattern[y];
        for (let x = 0; x < row.length; x++) {
          if (row[x] !== "1") continue;
          const px = flipX ? (row.length - 1 - x) : x;
          ctx.fillStyle = color;
          ctx.fillRect(startX + (px * size), startY + (y * size), size, size);
        }
      }
    }

    function getAnimState(id, t) {
      switch (id) {
        case "joy": return { dx: 0, dy: Math.sin(t * 0.01) * 1.6, scale: 1 + Math.sin(t * 0.014) * 0.03 };
        case "sad": return { dx: 0, dy: Math.sin(t * 0.004) * 2.4, scale: 1 };
        case "angry": return { dx: Math.sign(Math.sin(t * 0.06)) * 1.2, dy: 0, scale: 1 };
        case "fear": return { dx: Math.sin(t * 0.09) * 1.4, dy: Math.cos(t * 0.07) * 1.1, scale: 1 };
        case "disgust": return { dx: 0, dy: 0, scale: 1 + Math.sin(t * 0.012) * -0.04 };
        case "surprise": return { dx: 0, dy: 0, scale: 1 + Math.sin(t * 0.014) * 0.12 };
        case "trust": return { dx: 0, dy: Math.sin(t * 0.004) * -0.8, scale: 1 };
        case "hope": return { dx: 0, dy: Math.sin(t * 0.01) * -1.8, scale: 1 + Math.sin(t * 0.01) * 0.02 };
        default: return { dx: 0, dy: 0, scale: 1 };
      }
    }

    function render(time = 0) {
      const id = ids[currentIndex];
      const anim = getAnimState(id, time);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const unit = 4 * anim.scale;
      const leftX = (canvas.width * 0.23) + anim.dx;
      const rightX = (canvas.width * 0.62) - anim.dx;
      const y = (canvas.height * 0.34) + anim.dy;
      const color = "#f5f5f5";

      if (id === "angry") {
        drawPattern(patterns.angryL, leftX, y, unit, color);
        drawPattern(patterns.angryR, rightX, y, unit, color);
      } else if (id === "fear") {
        drawPattern(patterns.fearL, leftX, y, unit, color);
        drawPattern(patterns.fearR, rightX, y, unit, color);
      } else {
        drawPattern(patterns[id], leftX, y, unit, color);
        drawPattern(patterns[id], rightX, y, unit, color, true);
      }

      requestAnimationFrame(render);
    }

    function setOverviewMode(enabled) {
      document.body.classList.toggle("overview-mode", enabled);
      overviewToggle.classList.toggle("active", enabled);
      overviewToggle.textContent = enabled ? "기본크기" : "전체보기";
    }

    function select(which) {
      const idx = typeof which === "number" ? which : ids.indexOf(which);
      if (idx < 0) return;
      currentIndex = idx;
      document.querySelectorAll(".controls button").forEach((btn, i) => {
        btn.classList.toggle("active", i === idx);
      });
      document.title = labels[idx] + " — 8가지 눈";
    }

    overviewToggle.addEventListener("click", () => {
      setOverviewMode(!document.body.classList.contains("overview-mode"));
    });

    document.querySelector(".controls").addEventListener("click", e => {
      const btn = e.target.closest("button[data-target]");
      if (!btn) return;
      select(btn.dataset.target);
    });

    document.addEventListener("keydown", e => {
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
      const n = Number(e.key);
      if (n >= 1 && n <= 8) {
        e.preventDefault();
        select(n - 1);
      } else if (e.key === "0") {
        e.preventDefault();
        setOverviewMode(!document.body.classList.contains("overview-mode"));
      }
    });

    select(0);
    requestAnimationFrame(render);
  </script>
</body>
</html>
